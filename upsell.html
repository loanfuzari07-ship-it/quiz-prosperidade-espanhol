  <script>
    // Aviso suave al intentar salir o actualizar, reforzando la urgencia.
    window.addEventListener('beforeunload', function (e) {
      e.preventDefault();
      e.returnValue = '';
    });

  <script>
    // ============================================================
    // Revela el CTA (texto de oferta + widget de Hotmart) recién
    // cuando el video del VTurb alcanza los 7:19 (439s) de
    // reproducción real. El contador solo corre mientras el video
    // está efectivamente reproduciéndose (currentTime del player).
    // ============================================================
    (function () {
      var CTA_REVEAL_SECONDS = 455; // 07:35
      var hooked = false;
      var attempts = 0;

      function showCta() {
        var meta = document.getElementById('upsell-offer-meta');
        var widget = document.getElementById('hotmart-upsell-button-slot');
        if (meta) meta.classList.add('is-visible');
        if (widget) widget.classList.add('is-visible');
      }

      function tryHookPlayer() {
        if (hooked) return;

        if (typeof window.smartplayer === 'undefined' || !(window.smartplayer.instances && window.smartplayer.instances.length)) {
          attempts += 1;
          if (attempts >= 40) return;
          setTimeout(tryHookPlayer, 500);
          return;
        }

        var instance = window.smartplayer.instances[0];
        if (!instance || typeof instance.on !== 'function') {
          attempts += 1;
          if (attempts >= 40) return;
          setTimeout(tryHookPlayer, 500);
          return;
        }

        hooked = true;

        instance.on('timeupdate', function () {
          var currentTime = (instance.video && instance.video.currentTime) || 0;
          if (currentTime >= CTA_REVEAL_SECONDS) {
            showCta();
          }
        });
      }

      setTimeout(tryHookPlayer, 600);
    })();
  </script>
